<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocuMind — AI Document Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #173b73 0%, #0d1730 42%, #081122 100%);
      color: #dce9ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container { max-width: 720px; width: 100%; }

    /* Header */
    header { text-align: center; margin-bottom: 36px; }

    .brand {
      font-family: 'Archivo Black', sans-serif;
      font-size: 2.8em;
      background: linear-gradient(135deg, #8cc7ff 0%, #4ea1ff 50%, #1d74ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .tagline { font-size: 0.95em; color: #7a96bc; font-weight: 300; }

    /* Auth bar */
    .auth-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(14,27,56,0.92);
      border: 1px solid rgba(77,145,255,0.16);
      border-radius: 14px;
      padding: 12px 18px;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .auth-info { font-size: 0.88em; color: #7a96bc; }
    .auth-info span { color: #8cc7ff; font-weight: 600; }

    .auth-btns { display: flex; gap: 8px; }

    .btn-sm {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(77,145,255,0.3);
      background: rgba(17,39,80,0.9);
      color: #dce9ff;
      font-size: 0.82em;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .btn-sm:hover { background: rgba(24,51,102,0.95); }

    .btn-sm.primary {
      background: linear-gradient(135deg, #2f78ff 0%, #1858d6 100%);
      border-color: rgba(77,145,255,0.6);
    }

    /* Cards */
    .card {
      background: linear-gradient(180deg, rgba(14,27,56,0.92) 0%, rgba(10,18,38,0.95) 100%);
      border: 1px solid rgba(77,145,255,0.16);
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 0.82em;
      font-weight: 700;
      color: #4a6080;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 20px;
    }

    /* Upload */
    .upload-area {
      border: 2px dashed rgba(77,145,255,0.3);
      border-radius: 14px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(18,37,74,0.5);
      position: relative;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: rgba(77,145,255,0.7);
      background: rgba(20,44,88,0.8);
      transform: translateY(-2px);
    }

    .upload-area input { display: none; }
    .upload-icon { font-size: 2.8em; margin-bottom: 10px; animation: bounce 2.5s ease-in-out infinite; }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .upload-area p { color: #7a96bc; font-size: 0.9em; }
    .upload-area p b { color: #4f8ef7; }

    .file-selected {
      margin-top: 12px;
      font-size: 0.85em;
      color: #4f8ef7;
      font-weight: 600;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2f78ff 0%, #1858d6 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 16px rgba(47,120,255,0.28);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(47,120,255,0.4);
    }

    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.85em;
      display: none;
    }

    .status.success { background: rgba(76,175,130,0.1); border: 1px solid rgba(76,175,130,0.28); color: #4caf82; display: block; }
    .status.error { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.28); color: #ff9ea8; display: block; }
    .status.loading { background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.28); color: #4f8ef7; display: block; }

    /* Ask section */
    #ask-section { display: none; }

    .doc-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(76,175,130,0.1);
      border: 1px solid rgba(76,175,130,0.28);
      color: #4caf82;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.82em;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      background: rgba(10,20,45,0.9);
      border: 1px solid rgba(77,145,255,0.18);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 16px;
      gap: 4px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: #4a6080;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .mode-btn.active {
      background: rgba(47,120,255,0.2);
      color: #8cc7ff;
      border: 1px solid rgba(77,145,255,0.4);
    }

    .mode-hint {
      font-size: 0.82em;
      color: #7a96bc;
      padding: 10px 14px;
      background: rgba(16,34,68,0.8);
      border-radius: 8px;
      border-left: 3px solid #4f8ef7;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      background: rgba(11,24,49,0.95);
      border: 1px solid rgba(77,145,255,0.22);
      border-radius: 12px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 0.95em;
      font-family: 'Inter', sans-serif;
      resize: none;
      outline: none;
      min-height: 90px;
      transition: border 0.2s;
      margin-bottom: 14px;
    }

    textarea:focus { border-color: #4f8ef7; box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }

    /* Answer */
    .answer-box {
      margin-top: 20px;
      display: none;
      background: rgba(10,22,48,0.95);
      border: 1px solid rgba(77,145,255,0.18);
      border-radius: 14px;
      padding: 22px;
    }

    .answer-label {
      font-size: 0.75em;
      font-weight: 700;
      color: #4a6080;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .answer-text {
      font-size: 0.95em;
      line-height: 1.75;
      color: #d5e3f8;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    .sources-info {
      font-size: 0.78em;
      color: #4a6080;
      padding-top: 12px;
      border-top: 1px solid rgba(77,145,255,0.12);
      text-align: right;
      font-style: italic;
    }

    /* History */
    .history-section { display: none; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .history-title {
      font-size: 0.82em;
      font-weight: 700;
      color: #4a6080;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .history-clear {
      font-size: 0.78em;
      color: #4a6080;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .history-clear:hover { color: #ff9ea8; }

    .history-item {
      padding: 14px 16px;
      background: rgba(15,35,72,0.8);
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 3px solid #4f8ef7;
      transition: all 0.2s;
    }

    .history-item:hover { background: rgba(21,46,92,0.9); transform: translateX(3px); }

    .history-q {
      font-size: 0.85em;
      font-weight: 600;
      color: #8cc7ff;
      margin-bottom: 6px;
    }

    .history-a {
      font-size: 0.82em;
      color: #7a96bc;
      line-height: 1.55;
    }

    .history-meta {
      font-size: 0.75em;
      color: #3a5070;
      margin-top: 6px;
    }

    .guest-history-note {
      text-align: center;
      padding: 20px;
      font-size: 0.85em;
      color: #4a6080;
    }

    .guest-history-note a {
      color: #4f8ef7;
      text-decoration: none;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .card { padding: 24px 18px; }
      .brand { font-size: 2em; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="brand">DocuMind</div>
    <p class="tagline">AI-Powered Document Intelligence</p>
  </header>

  <!-- Auth Bar -->
  <div class="auth-bar">
    <div class="auth-info" id="auth-info">Guest mode — history not saved</div>
    <div class="auth-btns">
      <button class="btn-sm primary" id="signin-btn" onclick="window.location.href='login.html'">Sign In</button>
      <button class="btn-sm" id="logout-btn" style="display:none" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Upload Card -->
  <div class="card">
    <div class="card-title">📄 Upload Document</div>
    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" accept=".pdf"/>
      <div class="upload-icon">📂</div>
      <p><b>Click to upload</b> or drag and drop</p>
      <p style="margin-top:4px; font-size:0.8em;">PDF files only</p>
      <div class="file-selected" id="file-selected"></div>
    </div>
    <button class="btn-primary" id="upload-btn" disabled>Upload & Index</button>
    <div class="status" id="upload-status"></div>
  </div>

  <!-- Ask Card -->
  <div class="card" id="ask-section">
    <div class="card-title">💬 Ask a Question</div>
    <div class="doc-badge" id="doc-badge">✅ <span id="doc-name"></span></div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="doc-mode-btn" onclick="setMode('doc')">📄 Document</button>
      <button class="mode-btn" id="chat-mode-btn" onclick="setMode('general')">💬 General Chat</button>
    </div>

    <div class="mode-hint" id="mode-hint">Answers only from your uploaded PDF</div>

    <textarea id="question-input" placeholder="What is this document about?"></textarea>
    <button class="btn-primary" id="ask-btn">Ask</button>

    <div class="answer-box" id="answer-box">
      <div class="answer-label">Answer</div>
      <div class="answer-text" id="answer-text"></div>
      <div class="sources-info" id="sources-info"></div>
    </div>
  </div>

  <!-- History Card -->
  <div class="card history-section" id="history-section">
    <div class="history-header">
      <div class="history-title">🕘 Recent History</div>
      <button class="history-clear" id="clear-history-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div id="history-items"></div>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:8000";
  let currentDocId = null;
  let currentMode = "doc";
  let qaHistory = [];
  let authToken = localStorage.getItem("documind_auth_token_v1") || "";
  let userEmail = localStorage.getItem("documind_user_email") || "";
  let isLoggedIn = false;

  // ── Init ──────────────────────────────────────────────────

  async function init() {
    if (authToken) {
      try {
        const res = await fetch(`${API}/auth/me`, {
          headers: { "Authorization": `Bearer ${authToken}` }
        });
        if (res.ok) {
          const data = await res.json();
          isLoggedIn = true;
          userEmail = data.email;
          updateAuthBar();
          await loadHistory();
        } else {
          logout(false);
        }
      } catch { logout(false); }
    } else {
      updateAuthBar();
    }
  }

  function updateAuthBar() {
    const info = document.getElementById("auth-info");
    const signinBtn = document.getElementById("signin-btn");
    const logoutBtn = document.getElementById("logout-btn");

    if (isLoggedIn) {
      info.innerHTML = `Signed in as <span>${userEmail}</span>`;
      signinBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";
      document.getElementById("history-section").style.display = "block";
    } else {
      info.textContent = "Guest mode — history not saved";
      signinBtn.style.display = "inline-block";
      logoutBtn.style.display = "none";
    }
  }

  function logout(redirect = true) {
    localStorage.removeItem("documind_auth_token_v1");
    localStorage.removeItem("documind_user_email");
    authToken = "";
    userEmail = "";
    isLoggedIn = false;
    updateAuthBar();
    qaHistory = [];
    renderHistory();
    if (redirect) window.location.reload();
  }

  // ── Upload ────────────────────────────────────────────────

  const fileInput = document.getElementById("file-input");
  const uploadArea = document.getElementById("upload-area");
  const uploadBtn = document.getElementById("upload-btn");
  const uploadStatus = document.getElementById("upload-status");
  const fileSelected = document.getElementById("file-selected");

  uploadArea.addEventListener("dragover", e => { e.preventDefault(); uploadArea.classList.add("dragover"); });
  uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
  uploadArea.addEventListener("drop", e => {
    e.preventDefault();
    uploadArea.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file?.name.endsWith(".pdf")) { fileInput.files = e.dataTransfer.files; handleFileSelect(file); }
  });

  uploadArea.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) handleFileSelect(fileInput.files[0]); });

  function handleFileSelect(file) {
    fileSelected.textContent = `Selected: ${file.name}`;
    uploadBtn.disabled = false;
  }

  uploadBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) return;

    uploadBtn.disabled = true;
    uploadBtn.innerHTML = `<span class="spinner"></span> Indexing...`;
    uploadStatus.className = "status loading";
    uploadStatus.innerHTML = `<span class="spinner"></span> Uploading and indexing — this may take a moment...`;

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Upload failed");

      currentDocId = data.doc_id;
      uploadStatus.className = "status success";
      uploadStatus.textContent = `✅ Indexed ${data.chunks_stored} sections from "${data.filename}"`;

      document.getElementById("doc-name").textContent = data.filename;
      document.getElementById("ask-section").style.display = "block";
      document.getElementById("ask-section").scrollIntoView({ behavior: "smooth" });

    } catch (err) {
      uploadStatus.className = "status error";
      uploadStatus.textContent = `❌ ${err.message}`;
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "Upload & Index";
    }
  });

  // ── Mode ──────────────────────────────────────────────────

  function setMode(mode) {
    currentMode = mode;
    document.getElementById("doc-mode-btn").classList.toggle("active", mode === "doc");
    document.getElementById("chat-mode-btn").classList.toggle("active", mode === "general");
    document.getElementById("mode-hint").textContent = mode === "doc"
      ? "Answers only from your uploaded PDF"
      : "Ask any follow-up or general question freely";
    document.getElementById("question-input").placeholder = mode === "doc"
      ? "What is this document about?"
      : "Can I build this project in VS Code?";
    document.getElementById("answer-box").style.display = "none";
  }

  // ── Ask ───────────────────────────────────────────────────

  const askBtn = document.getElementById("ask-btn");
  const questionInput = document.getElementById("question-input");

  askBtn.addEventListener("click", async () => {
    const question = questionInput.value.trim();
    if (!question) return;

    askBtn.disabled = true;
    askBtn.innerHTML = `<span class="spinner"></span> Thinking...`;
    document.getElementById("answer-box").style.display = "none";

    try {
      let data;
      if (currentMode === "doc") {
        const res = await fetch(`${API}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doc_id: currentDocId, question })
        });
        data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        document.getElementById("sources-info").textContent = `Based on ${data.sources_used} relevant sections`;
      } else {
        const res = await fetch(`${API}/general-ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        document.getElementById("sources-info").textContent = "Answered from general knowledge";
      }

      document.getElementById("answer-text").textContent = data.answer;
      document.getElementById("answer-box").style.display = "block";

      // Save history
      if (isLoggedIn) {
        await fetch(`${API}/history`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${authToken}`
          },
          body: JSON.stringify({
            question,
            answer: data.answer,
            mode: currentMode,
            doc_names: currentMode === "doc" ? [document.getElementById("doc-name").textContent] : []
          })
        });
        await loadHistory();
      } else {
        qaHistory.unshift({ q: question, a: data.answer, mode: currentMode });
        renderHistory();
      }

      questionInput.value = "";

    } catch (err) {
      document.getElementById("answer-text").textContent = `Error: ${err.message}`;
      document.getElementById("answer-box").style.display = "block";
    } finally {
      askBtn.disabled = false;
      askBtn.textContent = "Ask";
    }
  });

  questionInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); askBtn.click(); }
  });

  // ── History ───────────────────────────────────────────────

  async function loadHistory() {
    if (!isLoggedIn) { renderHistory(); return; }
    try {
      const res = await fetch(`${API}/history`, {
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      const data = await res.json();
      qaHistory = data.history || [];
      document.getElementById("history-section").style.display = "block";
      renderHistory();
    } catch { qaHistory = []; }
  }

  function renderHistory() {
    const el = document.getElementById("history-items");
    if (!isLoggedIn) {
      el.innerHTML = `<div class="guest-history-note">
        <a href="login.html">Sign in</a> to save your Q&A history across sessions.
      </div>`;
      return;
    }
    if (qaHistory.length === 0) {
      el.innerHTML = `<div class="guest-history-note" style="color:#3a5070">No history yet. Ask a question to get started.</div>`;
      return;
    }
    el.innerHTML = qaHistory.map(item => `
      <div class="history-item">
        <div class="history-q">${item.mode === "doc" ? "📄" : "💬"} ${escapeHtml(item.q)}</div>
        <div class="history-a">${escapeHtml(item.a)}</div>
        <div class="history-meta">${item.displayTime || ""}</div>
      </div>
    `).join("");
  }

  async function clearHistory() {
    qaHistory = [];
    renderHistory();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  init();
</script>
</body>
</html>
